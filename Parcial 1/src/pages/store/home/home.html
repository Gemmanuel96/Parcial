<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compra productos</title>
</head>

<body>

    <!-- Header con links al carrito y al catalogo -->
    <header>
        <div class="encabezado-box uno">
            <h1>🍕Food Store</h1>
        </div>

        <div class="encabezado-box dos">
            <a href="">Catalogo</a>
            <a href="../cart/cart.html">Carrito (<span id="valor-carrito" class="valor-carrito"></span>)</a>
        </div>

    </header>

    <!--Main  -->
    <main>

        <!-- Seccion de categorias -->
        <section id="categorias-var">
            <h2>Categorias</h2>

            <ul id="categoria-list">
                <li id="all-productos" value="todos">Todos los productos</li>
            </ul>
        </section>

        <!-- Seccion  de productos -->
        <section id="productos-box">

            <!-- Buscador de productos-->
            <div class="buscador">
                <input type="text" id="buscador" name="buscador" placeholder="🔎 Buscar ">
            </div>

            <!-- Alerta de producto agregado al carrito -->
            <div id="alerta" class="alerta">
                <p>✅ Agregado al carrito!</p>
            </div>

            <!-- Caja de Productos (Items) -->
            <div id="productos">

            </div>

        </section>
    </main>

    <script type="module" src="home.ts"></script>
</body>

</html>
