<!DOCTYPE html>
<html lang="es">

<head>
    <link rel="stylesheet" href="login.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login 🍕</title>
</head>

<body>
    <main>

        <!-- Caja de Formulario -->
        <div class="form-container">

            <h1>food store</h1>
            <h2>Iniciar Sesion</h2>

            <!-- Formulario -->
            <form action="" class="formulario" id="formulario">

                <div id="inputs" class="inputs">
                    <!-- Email -->
                    <label for="email">Email:</label>
                    <input type="email" name="email" id="email" placeholder="tucorreo@ejemplo.com" required>

                    <!-- Contraseña -->
                    <label for="contrasenia">Contraseña:</label>
                    <input type="password" id="contrasenia" name="contrasenia" placeholder="Ingrese 8 carateres"
                        required>

                    <button type="submit">Ingresar</button>

            </form>

            <div class="usuarios-prueba">
                <h3>Cuentas prueba: </h3>
                <p>Admin: admin@admin.com</p>
                <p>Usuario: usuario@user.com</p>
            </div>

            </section>

    </main>
    <script src="login.ts" type="module"></script>
</body>

</html>
